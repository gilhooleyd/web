<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wim Hof Breathing Timer</title>
    <link rel="stylesheet" href="/libs/tacit-css.css"/>
    <link rel="stylesheet" href="/common/style.css"/>
    <style>
    .video-container {
      width: 70%;
      margin: 0 auto 1rem auto;
      aspect-ratio: 16 / 9;
    }
    .video-container iframe {
      width: 100%;
      height: 100%;
    }
    .timer-display {
      font-size: 3rem;
      text-align: center;
      display: block;
      margin: 1rem 0;
    }
    .round-indicator {
      text-align: center;
      font-weight: bold;
    }
    .heatmap-container {
      overflow-x: auto;
      margin-bottom: 1rem;
      padding: 0.5rem;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .stats-prominent {
      display: flex;
      gap: 2rem;
      margin: 1rem 0 2rem 0;
    }
    .stat-card {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .stat-value {
      font-size: 2.2rem;
      font-weight: bold;
      color: #0066cc;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
    }
    .heatmap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .heatmap-year {
      font-size: 0.9rem;
      color: #888;
    }
    .heatmap-months {
      display: grid;
      grid-auto-flow: column;
      grid-gap: 3px;
      margin-bottom: 5px;
      font-size: 0.7rem;
      color: #888;
      height: 1rem;
    }
    .heatmap-month-label {
      white-space: nowrap;
    }
    .heatmap-grid {
      display: grid;
      grid-template-rows: repeat(7, 10px);
      grid-auto-flow: column;
      grid-gap: 3px;
      width: max-content;
    }
    .heatmap-day {
      width: 10px;
      height: 10px;
      background-color: #ebedf0;
      border-radius: 2px;
    }
    .heatmap-day.active {
      background-color: #4CAF50;
    }
    .top-right {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      margin: 0;
    }
    section {
      position: relative;
    }
    </style>
  </head>
  <body>
    <nav>
      <h1>Wim Hof Breathing Timer</h1>
    </nav>
    <div class="container">
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/tybOi4hjZFQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>

      <div id="timer-mount"></div>
      <div id="heatmap-mount"></div>
      <div id="results-mount"></div>
    </div>
  </body>
  <script src="/libs/mithril.js"></script>
  <script src="script.js"></script>
</html>
