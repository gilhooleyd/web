<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wim Hof Breathing Timer</title>
    <link rel="stylesheet" href="tacit-css.css"/>
    <style>
    h1:first-child, h2:first-child {
      margin-top: 0;
      color: #0066cc;
    }
    body {
      background-color: #f0f8ff;
    }
    section {
      background-color: white;
      margin-bottom: 2rem;
      padding: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .video-container {
      position: relative;
      width: 50%;
      margin: 0 auto 1rem auto;
      padding-bottom: 28.125%; /* 50% of 56.25% to maintain 16:9 for half width */
      height: 0;
      overflow: hidden;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .timer-display {
      font-size: 3rem;
      text-align: center;
      display: block;
      margin: 1rem 0;
    }
    .round-indicator {
      text-align: center;
      font-weight: bold;
    }
    .heatmap-container {
      overflow-x: auto;
      margin-bottom: 1rem;
      padding: 0.5rem;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .stats-prominent {
      display: flex;
      gap: 2rem;
      margin: 1rem 0 2rem 0;
    }
    .stat-card {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .stat-value {
      font-size: 2.2rem;
      font-weight: bold;
      color: #0066cc;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
    }
    .heatmap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .heatmap-year {
      font-size: 0.9rem;
      color: #888;
    }
    .heatmap-months {
      display: grid;
      grid-auto-flow: column;
      grid-gap: 3px;
      margin-bottom: 5px;
      font-size: 0.7rem;
      color: #888;
      height: 1rem;
    }
    .heatmap-month-label {
      white-space: nowrap;
    }
    .heatmap-grid {
      display: grid;
      grid-template-rows: repeat(7, 10px);
      grid-auto-flow: column;
      grid-gap: 3px;
      width: max-content;
    }
    .heatmap-day {
      width: 10px;
      height: 10px;
      background-color: #ebedf0;
      border-radius: 2px;
    }
    .heatmap-day.active {
      background-color: #4CAF50;
    }
    #startBtn {
      background-color: #4CAF50;
      color: white;
    }
    #stopBtn {
      background-color: #f44336;
      color: white;
    }
    #finishBtn {
      background-color: #2196F3;
      color: white;
    }
    button:disabled {
      background-color: #cccccc !important;
      color: #666;
      cursor: not-allowed;
    }
    </style>
  </head>
  <body>
    <nav>
      <h1>Wim Hof Breathing Timer</h1>
    </nav>
    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/tybOi4hjZFQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div id="timer-mount"></div>
    <div id="heatmap-mount"></div>
    <div id="results-mount"></div>

  </body>
  <script src="mithril.js"></script>
  <script src="script.js"></script>
</html>
